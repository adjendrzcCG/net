# ============================================================================
# SimpleWebApp — Spring Boot Application Configuration
# Java / Spring Boot 3.3.5 equivalent of appsettings.json
#
# .NET appsettings.json equivalent mapping:
#   Logging.LogLevel.Default         → logging.level.root
#   Logging.LogLevel.Microsoft.AspNetCore → logging.level.org.springframework.web
#   AllowedHosts                     → server.tomcat.remoteip.* / no direct equivalent
#                                      (Spring Boot uses server.tomcat.* for access control)
# ============================================================================

# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=SimpleWebApp

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# Error handling — maps to app.UseExceptionHandler("/Home/Error") in Startup.cs
server.error.path=/home/error
# Disable Spring Boot's default whitelabel error page (we use our own template)
server.error.whitelabel.enabled=false

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
# Template location in classpath (populated from Views/ by Maven resource config)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# Disable template caching for development; enable in production via profile
spring.thymeleaf.cache=false

# ─── Static Resources ────────────────────────────────────────────────────────
# Served from classpath:/static/ (populated from wwwroot/ by Maven resource config)
spring.web.resources.static-locations=classpath:/static/
# Cache static resources for 1 year in production (override per profile)
spring.web.resources.cache.period=0

# ─── Logging ─────────────────────────────────────────────────────────────────
# Equivalent to appsettings.json: "Logging.LogLevel.Default": "Information"
logging.level.root=INFO
# Equivalent to appsettings.json: "Logging.LogLevel.Microsoft.AspNetCore": "Warning"
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=INFO
logging.level.com.simplewebapp=INFO
